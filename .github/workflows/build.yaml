name: Build & Release
on:
  push:
    branches: [v1]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: go build -o infpro-${{ matrix.goarch }} ./main.go
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          files: infpro-${{ matrix.goarch }}